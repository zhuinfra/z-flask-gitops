apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: z-flask-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zhuinfra/z-flask-gitops.git
    targetRevision: main
    path: overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
